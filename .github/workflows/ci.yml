name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: lint + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Tool versions
        run: |
          python --version
          pip --version
          ruff --version
          mypy --version
          pytest --version

      - name: Ruff (lint)
        run: |
          ruff check src tests \
            --output-format=full \
            --show-fixes \
            --statistics \
            --no-cache

      - name: Ruff (format check)
        run: |
          ruff format --check --diff src tests --no-cache

      - name: Mypy
        run: |
          mypy src/vulcan \
            --show-error-codes \
            --show-error-context \
            --show-column-numbers \
            --pretty
        continue-on-error: true

      - name: Pytest
        run: |
          pytest \
            -vv \
            -rA \
            --showlocals \
            --tb=short \
            --color=yes \
            --durations=25 \
            --cov=vulcan \
            --cov-report=term-missing

  audit:
    name: dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt

  docker:
    name: docker build smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: vulcan:ci
          load: true

      - name: Smoke test container
        run: |
          docker run -d --name vulcan -p 5000:5000 vulcan:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:5000/healthz; then
              echo
              echo "healthz OK"
              break
            fi
            sleep 1
          done
          docker logs vulcan
          docker rm -f vulcan
